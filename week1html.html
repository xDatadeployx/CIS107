<!DOCTYPE html>
<html>
  <head>
    <title>Week 1 HTML Assignment</title>

    <style>
      body {
        background-color: #f0f8ff;
        font-family: Garamond, sans-serif;
        color: #333;
      }

      .container {
        background-color: lightgrey;
        padding: 20px;
        margin: 20px;
        border-radius: 15px;
      }

      img {
        width: 200px;
        border-radius: 10px;
      }

      .inline-example {
        display: inline;
        color: blue;
      }

      .block-example {
        display: block;
        margin-top: 10px;
        color: green;
      }

      button {
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 100px;
        padding: 10px 20px;
        font-family: Tahoma, sans-serif;
        cursor: pointer;
      }

      button:hover {
        background-color: #45a049;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Welcome to My HTML Page</h2>

      <p>This is a paragraph demonstrating basic HTML structure.</p>

      <a href="https://www.google.com" target="_blank">Visit Google</a>

      <br /><br />

      <img src="../DataDeploy.webp" alt="Sample Image" />

      <h2>My Favorite Things</h2>
      <ul>
        <li>Music</li>
        <li>Gaming</li>
        <li>Coding</li>
      </ul>

      <h2>Display Examples</h2>
      <span class="inline-example">This is inline text</span>
      <span class="block-example">This is block text</span>

      <h2>Contact Form</h2>
      <form>
        <label>Name:</label><br />
        <input type="text" name="name" /><br /><br />

        <label>Email:</label><br />
        <input type="email" name="email" /><br /><br />

        <label>Birth Date:</label><br />
        <input type="date" name="birthdate" /><br /><br />

        <label>Phone Number:</label><br />
        <input type="tel" name="phone" /><br /><br />

        <label>Password:</label><br />
        <input type="password" name="password" /><br /><br />

        <button type="submit">Submit</button>
      </form>

      <h2>My Favorite Video</h2>

<iframe width="560" height="315" src="https://www.youtube.com/embed/gq5PMJ-pn48?si=oLpQax4fF1n4Ba2n" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>


    </div>



  </body>
</html>
